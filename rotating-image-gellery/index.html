<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotating Image Gallery</title>
</head>
<body>
    <div class="image-container">
        <span style="--i: 1">
            <img src="https://picsum.photos/id/255/300/200">
        </span>
        <span style="--i: 2">
            <img src="https://picsum.photos/id/390/300/200">
        </span>
        <span style="--i: 3">
            <img src="https://picsum.photos/id/250/300/200">
        </span>
        <span style="--i: 4">
            <img src="https://picsum.photos/id/159/300/200">
        </span>
        <span style="--i: 5">
            <img src="https://picsum.photos/id/59/300/200">
        </span>
        <span style="--i: 6">
            <img src="https://picsum.photos/id/89/300/200">
        </span>
        <span style="--i: 7">
            <img src="https://picsum.photos/id/55/300/200">
        </span>
        <span style="--i: 8">
            <img src="https://picsum.photos/id/25/300/200">
        </span>
    </div>
    <div class="btn-container">
        <button class="btn" id="prev">Previous</button>
        <button class="btn" id="next">Next</button>
    </div>
</body>
</html>
